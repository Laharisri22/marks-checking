
<html>
    <head>
        <link rel="stylesheet" href={{ url_for("static",filename="css/styles.css")}} >
    </head>
<body>
    <div class="result-box">
        <h1>Your Result</h1>

        <table>
            {% for key, value in result.items() %}
            <tr>
                <th>{{ key }}</th>
                <th>{{ value }}</th>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
